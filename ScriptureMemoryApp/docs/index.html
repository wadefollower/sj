<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f7567">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="背经">
  <meta name="description" content="一个可离线使用的经文背诵 PWA。">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-512.png">
  <title>背经</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --surface: #fffdf8;
      --surface-2: #efe9df;
      --text: #27231e;
      --muted: #736b60;
      --line: #dfd6ca;
      --accent: #2f7567;
      --accent-2: #b24d35;
      --gold: #c88b2d;
      --green: #2f8b57;
      --shadow: 0 18px 55px rgba(72, 57, 38, .15);
      --ui-font-11: 11px;
      --ui-font-12: 12px;
      --ui-font-13: 13px;
      --ui-font-14: 14px;
      --ui-font-15: 15px;
      --ui-font-16: 16px;
      --ui-font-17: 17px;
      --ui-font-18: 18px;
      --ui-font-20: 20px;
      --ui-font-24: 24px;
      --ui-font-28: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-size: var(--ui-font-16);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(135deg, rgba(47, 117, 103, .12), transparent 42%),
        linear-gradient(315deg, rgba(178, 77, 53, .10), transparent 38%),
        var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(430px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--surface);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, .92);
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(16px);
    }

    .topbar-main {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .title-block {
      flex: 1;
      min-width: 0;
    }

    .lang-switch {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      padding: 8px 10px;
      min-width: 72px;
    }

    .top-actions {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .font-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .font-btn {
      min-width: 34px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }

    .font-btn:disabled {
      color: #bdb4a7;
      cursor: default;
    }

    .font-size-label {
      min-width: 44px;
      text-align: center;
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .content {
      min-height: 0;
      overflow: auto;
      padding: 16px 16px 88px;
    }

    .section-title {
      margin: 22px 2px 10px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 700;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(92, 72, 42, .07);
    }

    .verse-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .verse-card:active {
      transform: translateY(1px);
    }

    .verse-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .ref {
      font-weight: 800;
      font-size: 17px;
    }

    .star {
      margin-left: auto;
      color: var(--gold);
      font-size: 18px;
    }

    .verse-text {
      margin: 0;
      font-size: var(--list-font-size, 16px);
      line-height: 1.55;
    }

    .meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .pill.done {
      background: rgba(47, 139, 87, .12);
      color: var(--green);
    }

    .pill.practice {
      background: rgba(178, 77, 53, .10);
      color: var(--accent-2);
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: #fff;
      color: var(--text);
      outline-color: var(--accent);
      margin-bottom: 14px;
    }

    .library-filter {
      margin-bottom: 10px;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
      outline-color: var(--accent);
    }

    .add-card {
      margin-bottom: 16px;
      background: #fbf7ef;
    }

    .add-card summary {
      cursor: pointer;
      font-weight: 800;
      color: var(--accent);
      list-style-position: inside;
    }

    .add-card .form-grid {
      margin-top: 12px;
    }

    .backup-warning {
      border: 1px solid rgba(178, 77, 53, .28);
      border-radius: 8px;
      padding: 11px 12px;
      background: rgba(178, 77, 53, .08);
      color: var(--accent-2);
      font-size: 13px;
      line-height: 1.55;
    }

    .backup-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden-file {
      display: none;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 4px;
      border-radius: 8px;
      background: var(--surface-2);
      margin-bottom: 14px;
    }

    .segmented button {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 9px 4px;
      font-size: 13px;
      font-weight: 700;
    }

    .segmented button.active {
      color: var(--text);
      background: #fff;
      box-shadow: 0 1px 6px rgba(64, 47, 25, .12);
    }

    .scripture-panel {
      min-height: 180px;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      font-size: var(--reader-font-size, 20px);
      line-height: 1.75;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      color: var(--text);
      outline-color: var(--accent);
    }

    .compare {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-line;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .speech-controls,
    .listen-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .speech-rate,
    .loop-mode {
      grid-column: 1 / -1;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
      outline-color: var(--accent);
    }

    .listen-picker {
      display: grid;
      gap: 10px;
    }

    .listen-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0 0;
    }

    .listen-actions .btn {
      min-height: 40px;
      font-size: 13px;
    }

    .listen-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .listen-item.active {
      border-color: var(--accent);
      background: rgba(47, 117, 103, .08);
    }

    .listen-item input {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--accent);
    }

    .listen-item strong {
      display: block;
      margin-bottom: 5px;
      line-height: 1.35;
    }

    .listen-item p {
      margin: 0;
      color: var(--muted);
      font-size: var(--list-font-size, 16px);
      line-height: 1.5;
    }

    .btn {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn.warn {
      border-color: rgba(178, 77, 53, .35);
      color: var(--accent-2);
    }

    .compare-link {
      color: var(--accent);
      text-decoration: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 10px;
      background: #fff;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-bottom: 5px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 44px 20px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .45);
    }

    .tabbar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100%);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 1px solid var(--line);
      background: rgba(255, 253, 248, .94);
      backdrop-filter: blur(16px);
      padding: 6px 8px 10px;
      z-index: 10;
    }

    .tabbar button {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 4px;
      min-height: 54px;
      display: grid;
      gap: 3px;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
    }

    .tabbar button.active {
      color: var(--accent);
      background: rgba(47, 117, 103, .10);
    }

    .tab-icon {
      font-size: 20px;
      line-height: 1;
    }

    .detail-back {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-weight: 800;
      padding: 0;
      margin-bottom: 12px;
    }

    .detail-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .detail-title-row h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.16;
      flex: 1;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--gold);
      font-size: 20px;
    }

    .small-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin: 8px 2px 0;
    }

    /* The size control scales the complete interface, not only verse text. */
    .lang-switch, .eyebrow, .small-note, .memory-hero p, .pair-card p, .pair-kicker { font-size: var(--ui-font-13); }
    .font-size-label, .pill, .stat span, .pair-progress { font-size: var(--ui-font-12); }
    .tabbar button { font-size: var(--ui-font-11); }
    .section-title { font-size: var(--ui-font-15); }
    .segmented button, .listen-actions .btn, .rating-grid .btn { font-size: var(--ui-font-13); }
    .compare, .recall-instruction { font-size: var(--ui-font-14); }
    .ref, .pair-card strong, .pair-reference { font-size: var(--ui-font-17); }
    h1, .detail-title-row h2, .pair-practice-header h2, .recall-topic { font-size: var(--ui-font-28); }
    .stat strong { font-size: var(--ui-font-24); }
    .tab-icon, .icon-btn, .memory-hero h2 { font-size: var(--ui-font-20); }

    .memory-hero {
      overflow: hidden;
      position: relative;
      background: linear-gradient(145deg, #1f665a, #2f7567 55%, #438d7d);
      color: #fff;
      border: 0;
      padding: 18px;
    }

    .memory-hero::after {
      content: "";
      position: absolute;
      width: 150px;
      height: 150px;
      right: -55px;
      top: -70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .10);
    }

    .memory-hero h2,
    .memory-hero p {
      position: relative;
      z-index: 1;
    }

    .memory-hero h2 {
      margin: 0 0 7px;
    }

    .memory-hero p {
      margin: 0;
      color: rgba(255, 255, 255, .86);
      line-height: 1.55;
    }

    .memory-sections {
      display: flex;
      gap: 6px;
      margin: 14px 0;
      overflow-x: auto;
      padding: 2px 0 5px;
      scrollbar-width: none;
    }

    .memory-sections::-webkit-scrollbar { display: none; }

    .memory-sections button {
      min-height: 42px;
      min-width: 48px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-weight: 900;
      padding: 8px 15px;
    }

    .memory-sections button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .topic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pair-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 15px 14px;
      min-height: 118px;
      background: linear-gradient(155deg, #fff, #fbf7ef);
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 9px;
      box-shadow: 0 8px 22px rgba(72, 57, 38, .07);
      transition: transform .15s ease, border-color .15s ease;
    }

    .pair-card:active { transform: scale(.98); }

    .topic-order {
      color: var(--accent);
      font-size: var(--ui-font-12);
      font-weight: 900;
      letter-spacing: .08em;
    }

    .pair-card strong { line-height: 1.35; }

    .pair-progress {
      color: var(--accent);
      font-weight: 800;
      margin-top: auto;
    }

    .pair-practice-header {
      text-align: center;
      padding: 10px 6px 18px;
    }

    .pair-kicker {
      margin: 0 0 7px;
      color: var(--accent);
      font-weight: 900;
    }

    .pair-practice-header h2 {
      margin: 0;
    }

    .pair-practice-header .small-note {
      margin-top: 9px;
    }

    .pair-verse {
      border-left: 4px solid var(--accent);
      margin-bottom: 12px;
    }

    .pair-number {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(47, 117, 103, .12);
      color: var(--accent);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .pair-reference {
      margin: 0 0 10px;
      color: var(--accent);
    }

    .pair-text {
      margin: 0;
      font-size: var(--reader-font-size, 20px);
      line-height: 1.75;
    }

    .recall-stage {
      min-height: 330px;
      display: grid;
      place-content: center;
      text-align: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(47, 117, 103, .12), transparent 34%),
        linear-gradient(160deg, #f1ece2, #fffdf8);
      border: 1px solid rgba(47, 117, 103, .20);
      border-radius: 22px;
      padding: 34px 22px;
      margin-bottom: 14px;
      box-shadow: 0 18px 42px rgba(72, 57, 38, .10);
    }

    .recall-stage .pair-kicker { color: var(--muted); }

    .recall-topic {
      margin: 8px 0 10px;
      line-height: 1.3;
      color: #1f5f54;
    }

    .recall-instruction {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .rating-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .rating-grid .btn {
      min-width: 0;
      padding: 8px 4px;
    }

    .practice-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 4px 0 18px;
    }

    .practice-step {
      border-top: 3px solid var(--line);
      padding-top: 7px;
      color: var(--muted);
      font-size: var(--ui-font-12);
      font-weight: 800;
    }

    .practice-step.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .answer-sheet {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      margin-bottom: 12px;
      box-shadow: 0 10px 28px rgba(72, 57, 38, .07);
    }

    .answer-sheet h3 {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: var(--ui-font-15);
    }

    .reference-inputs {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(58px, .65fr) minmax(68px, .75fr);
      gap: 7px;
      margin-bottom: 9px;
    }

    .reference-inputs select,
    .reference-inputs input {
      min-width: 0;
      padding: 10px 8px;
    }

    .answer-sheet textarea {
      min-height: 138px;
      font-size: var(--ui-font-16);
      line-height: 1.65;
    }

    .result-summary {
      text-align: center;
      border-radius: 20px;
      padding: 20px 16px;
      margin-bottom: 14px;
      background: linear-gradient(145deg, rgba(47, 117, 103, .12), rgba(255, 253, 248, .9));
      border: 1px solid rgba(47, 117, 103, .22);
    }

    .result-score {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: var(--ui-font-24);
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(47, 117, 103, .24);
    }

    .result-summary h2 { margin: 0 0 6px; }
    .result-summary p { margin: 0; color: var(--muted); }

    .answer-result {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      margin-bottom: 12px;
    }

    .answer-result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .answer-result-head strong { color: var(--accent); }

    .score-badge {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: var(--ui-font-12);
      font-weight: 900;
      background: rgba(47, 139, 87, .12);
      color: var(--green);
    }

    .score-badge.needs-work {
      background: rgba(178, 77, 53, .10);
      color: var(--accent-2);
    }

    .answer-result .pair-text { font-size: var(--ui-font-16); }
    .answer-result .small-note { margin-top: 10px; }

    .text-diff {
      margin-top: 14px;
      padding: 13px;
      border: 1px solid rgba(115, 107, 96, .18);
      border-radius: 13px;
      background: #faf8f3;
    }

    .text-diff-summary {
      margin: 0 0 12px;
      color: var(--accent-deep, var(--accent));
      font-size: var(--ui-font-13);
      font-weight: 850;
    }

    .text-diff-label {
      margin: 10px 0 5px;
      color: var(--muted);
      font-size: var(--ui-font-12);
      font-weight: 800;
    }

    .text-diff-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2px;
      font-family: ui-monospace, "SFMono-Regular", "PingFang SC", monospace;
      font-size: var(--ui-font-16);
      line-height: 1.8;
    }

    .text-diff-char {
      display: inline-grid;
      place-items: center;
      width: 1.55em;

        const saved = readSavedState().fontSize || localStorage.getItem("scripture.prototype.fontSize");
        return fontSteps.includes(saved) ? saved : "medium";
      } catch {
        return "medium";
      }

    const storageKey = "scripture.memory.pwa.v1";

    function readSavedState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || {};
      } catch {
        return {};
      }
    }

    function saveState() {
      const payload = {
        lang: state.lang,
        fontSize: state.fontSize,
        speechRate: state.speechRate,
        loopMode: state.loopMode,
        loopVerseIDs: state.loopVerseIDs,
        customVerses: state.customVerses,
        favorites: Array.from(state.favorites),
        progress: state.progress,
        pairProgress: state.pairProgress
      };

      try {
        localStorage.setItem(storageKey, JSON.stringify(payload));
      } catch {
        // Local storage can fail in private browsing or full-storage states.
      }
    }

    function backupPayload() {
      return {
        version: 1,
        app: "scripture-memory-pwa",
        exportedAt: new Date().toISOString(),
        data: {
          customVerses: state.customVerses,
          favorites: Array.from(state.favorites),
          progress: state.progress,
          settings: {
            lang: state.lang,
            fontSize: state.fontSize,
            speechRate: state.speechRate,
            loopMode: state.loopMode,
            loopVerseIDs: state.loopVerseIDs,
            pairProgress: state.pairProgress
          }
        }
      };
    }

    function exportUserData() {
      const date = new Date().toISOString().slice(0, 10);
      const blob = new Blob([JSON.stringify(backupPayload(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `scripture-memory-backup-${date}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function isPlainObject(value) {
      return Boolean(value) && typeof value === "object" && !Array.isArray(value);
    }

      if (!isPlainObject(verse)) return false;
      const language = verse.language === "en" ? "en" : "zh";
      const content = verse[language] || verse.zh || verse.en;
      return isPlainObject(content) && typeof content.text === "string" && content.text.trim() && (typeof content.book === "string" || typeof verse.referenceOverride === "string");
    }

          if (typeof id === "string" && validIDs.has(id)) state.favorites.add(id);
        });
      }

      if (isPlainObject(data.progress)) {
        Object.entries(data.progress).forEach(([id, progress]) => {
          if (validIDs.has(id) && isPlainObject(progress)) {
            state.progress[id] = { ...state.progress[id], ...progress };
          }
        });
      }

      const settings = isPlainObject(data.settings) ? data.settings : data;
      if (settings.lang === "zh" || settings.lang === "en") state.lang = settings.lang;
      if (fontSteps.includes(settings.fontSize)) state.fontSize = settings.fontSize;
      if (["slow", "normal", "fast"].includes(settings.speechRate)) state.speechRate = settings.speechRate;
      if (["once", "twice", "forever"].includes(settings.loopMode)) state.loopMode = settings.loopMode;
      if (Array.isArray(settings.loopVerseIDs)) {
        state.loopVerseIDs = settings.loopVerseIDs.filter((id) => typeof id === "string" && validIDs.has(id));
      }
      if (isPlainObject(data.pairProgress)) state.pairProgress = { ...state.pairProgress, ...data.pairProgress };
      if (isPlainObject(settings.pairProgress)) state.pairProgress = { ...state.pairProgress, ...settings.pairProgress };

      return importedCustomCount;
    }

    function t(key) {
      return key.split(".").reduce((value, part) => value && value[part], copy[state.lang]) || key;
    }

    function allVerses() {
      return [...builtInVerses, ...state.customVerses];
    }

    function contentOf(verse) {
      return verse[state.lang] || verse[verse.language] || verse.zh || verse.en;
    }

    function reference(verse) {
      const content = contentOf(verse);
      if (state.lang === "en" && verse.en && nivQueriesByID[verse.id]) {
        return `${content.book} · ${nivQueriesByID[verse.id]}`;
      }
      if (verse.referenceOverride) return verse.referenceOverride;
      return `${content.book} ${verse.chapter}:${verse.verse}`;
    }

    function progressFor(verse) {
      return state.progress[verse.id] || { reviewCount: 0, isMemorized: false, lastReviewedAt: null };
    }

    function currentVerseIDs() {
      return new Set(allVerses().map((verse) => verse.id));
    }

    function todayVerses() {
      const verses = allVerses();
      const unfinished = verses.filter((verse) => !progressFor(verse).isMemorized);
      return (unfinished.length ? unfinished : verses).slice(0, 3);
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isChineseChar(char) {
      return /[\u4e00-\u9fff]/.test(char);
    }

    function isMemoryChar(char, verse) {
      const content = contentOf(verse);
      const lang = content === verse.en ? "en" : (verse.language || state.lang);
      return lang === "en" ? /[A-Za-z]/.test(char) : isChineseChar(char);
    }

    function maskedText(verse) {
      const visibleStride = Math.max(2, 5 - state.hint);
      const text = contentOf(verse).text;
      return Array.from(text).map((char, index) => {
        if (!isMemoryChar(char, verse)) return char;
        return index % visibleStride === 0 ? char : "＿";
      }).join("");
    }

    function initialText(verse) {
      const chunkSize = Math.max(2, 6 - state.hint);
      const text = contentOf(verse).text;
      return Array.from(text).map((char, index) => {
        if (!isMemoryChar(char, verse)) return char;
        return index % chunkSize === 0 ? char : "·";
      }).join("");
    }

    function normalized(value, verse) {
      return Array.from(value)
        .filter((char) => isMemoryChar(char, verse))
        .join("")
        .toLowerCase();
    }

    function selfTestScore(verse) {
      const sourceChars = Array.from(normalized(contentOf(verse).text, verse));
      const typedChars = Array.from(normalized(state.answer, verse));
      const total = Math.max(sourceChars.length, typedChars.length);
      let correct = 0;

      for (let index = 0; index < total; index += 1) {
        if (sourceChars[index] && sourceChars[index] === typedChars[index]) {
          correct += 1;
        }
      }

      return {
        correct,
        sourceLength: sourceChars.length,
        typedLength: typedChars.length,
        total,
        percent: total ? Math.round((correct / total) * 100) : 0
      };
    }

    function compareText(verse) {
      if (!state.answer.trim()) return t("compareEmpty");
      if (!state.selfTestChecked) return t("compareEmpty");

      const score = selfTestScore(verse);
      const source = contentOf(verse).text;
      const summary = `${t("accuracy")}：${score.percent}% · ${t("matchedChars")}：${score.correct}/${score.sourceLength} · ${t("typedChars")}：${score.typedLength}`;
      const matchText = score.percent === 100 ? `${summary}\n${t("compareMatch")}` : summary;
      return `${matchText}\n${t("source")}：${source}`;
    }

    function speechRateValue() {
      return { slow: 0.72, normal: 0.9, fast: 1.08 }[state.speechRate] || 0.9;
    }

    function speechLangFor(verse) {
      const content = contentOf(verse);
      const sourceLang = verse.language || (content === verse.en ? "en" : state.lang);
      return sourceLang === "en" ? "en-US" : "zh-CN";
    }

    function speechTextFor(verse) {
      const separator = speechLangFor(verse) === "zh-CN" ? "。" : ". ";
      return `${reference(verse)}${separator}${contentOf(verse).text}`;
    }

    function speechIsAvailable() {
      return "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    }

    function createUtterance(verse) {
      const utterance = new SpeechSynthesisUtterance(speechTextFor(verse));
      utterance.lang = speechLangFor(verse);
      utterance.rate = speechRateValue();
      utterance.pitch = 1;

      const voices = speechSynthesis.getVoices();
      const matchingVoice = voices.find((voice) => voice.lang.toLowerCase().startsWith(utterance.lang.toLowerCase().slice(0, 2)));
      if (matchingVoice) {
        utterance.voice = matchingVoice;
      }

      return utterance;
    }

    function stopSpeaking() {
      loopPlayback.active = false;
      loopPlayback.session += 1;
      loopPlayback.currentID = null;
      if ("speechSynthesis" in window) {
        speechSynthesis.cancel();
      }
      updateLoopStatus();
    }

    function speakVerse(verse) {

    function selectedLoopVerses() {
      const ids = new Set(currentVerseIDs());
      state.loopVerseIDs = state.loopVerseIDs.filter((id) => ids.has(id));

      return state.loopVerseIDs
        .map((id) => allVerses().find((verse) => verse.id === id))
        .filter(Boolean);
    }

    function loopLimit() {
      if (state.loopMode === "once") return 1;
      if (state.loopMode === "twice") return 2;
      return Infinity;
    }

    function updateLoopStatus() {
      const status = document.querySelector("#listenStatus");
      if (!status) return;

      if (!loopPlayback.active) {
        status.textContent = `${t("listenSelected")}：${selectedLoopVerses().length}`;
        return;
      }

      const verse = allVerses().find((item) => item.id === loopPlayback.currentID);
      const position = loopPlayback.index + 1;
      const loopText = state.loopMode === "forever" ? "∞" : `${loopPlayback.loopCount + 1}/${loopLimit()}`;
      status.textContent = verse
        ? `${t("listeningNow")}：${reference(verse)} · ${position}/${loopPlayback.ids.length} · ${loopText}`
        : `${t("listeningNow")}...`;
    }

    function finishLoopReading() {
      loopPlayback.active = false;
      loopPlayback.currentID = null;
      updateLoopStatus();
      if (state.tab === "listen" && !state.detailID) render();
    }

    function playNextLoopVerse(session) {
      if (!loopPlayback.active || session !== loopPlayback.session) return;

      if (loopPlayback.index >= loopPlayback.ids.length) {
        loopPlayback.loopCount += 1;
        if (loopPlayback.loopCount >= loopLimit()) {
          finishLoopReading();
          return;
        }
        loopPlayback.index = 0;
      }

      const verse = allVerses().find((item) => item.id === loopPlayback.ids[loopPlayback.index]);
      if (!verse) {
        loopPlayback.index += 1;
        playNextLoopVerse(session);
        return;
      }

      loopPlayback.currentID = verse.id;
      updateLoopStatus();

      const utterance = createUtterance(verse);
      utterance.onend = () => {
        if (!loopPlayback.active || session !== loopPlayback.session) return;
        loopPlayback.index += 1;
        playNextLoopVerse(session);
      };
      utterance.onerror = utterance.onend;
      speechSynthesis.speak(utterance);
    }

    function startLoopReading() {
      if (!speechIsAvailable()) {
        alert(t("speechUnavailable"));
        return;

      const verses = selectedLoopVerses();
      if (!verses.length) {

        return;

      stopSpeaking();
      loopPlayback.active = true;
      loopPlayback.session += 1;
      loopPlayback.ids = verses.map((verse) => verse.id);
      loopPlayback.index = 0;
      loopPlayback.loopCount = 0;
      loopPlayback.currentID = null;
      const session = loopPlayback.session;
      render();
      playNextLoopVerse(session);
    }

    function normalizedReferencePart(value) {

        .toLowerCase()
        .replaceAll(" ", "")
        .replaceAll("，", ",")

    function textSimilarity(source, typed, verse) {
      const sourceChars = Array.from(normalized(source, verse));
      const typedChars = Array.from(normalized(typed, verse));
      if (!sourceChars.length) return 0;
      const previous = Array.from({ length: typedChars.length + 1 }, (_, index) => index);

      sourceChars.forEach((sourceChar, sourceIndex) => {
        const current = [sourceIndex + 1];
        typedChars.forEach((typedChar, typedIndex) => {
          current[typedIndex + 1] = sourceChar === typedChar
            ? previous[typedIndex]
            : Math.min(previous[typedIndex], previous[typedIndex + 1], current[typedIndex]) + 1;
        });
        previous.splice(0, previous.length, ...current);
      });

      const distance = previous[typedChars.length];
      const longest = Math.max(sourceChars.length, typedChars.length, 1);
      return Math.max(0, Math.round((1 - distance / longest) * 100));
    }

    function chineseTextDiff(source, typed) {
      const sourceChars = Array.from(source || "").filter(isChineseChar);
      const typedChars = Array.from(typed || "").filter(isChineseChar);
      if (!sourceChars.length) return null;

      const rows = sourceChars.length + 1;
      const columns = typedChars.length + 1;
      const matrix = Array.from({ length: rows }, () => Array(columns).fill(0));
      for (let row = 0; row < rows; row += 1) matrix[row][0] = row;
      for (let column = 0; column < columns; column += 1) matrix[0][column] = column;

      for (let row = 1; row < rows; row += 1) {
        for (let column = 1; column < columns; column += 1) {
          const substitutionCost = sourceChars[row - 1] === typedChars[column - 1] ? 0 : 1;
          matrix[row][column] = Math.min(
            matrix[row - 1][column] + 1,
            matrix[row][column - 1] + 1,
            matrix[row - 1][column - 1] + substitutionCost
          );
        }
      }

      const operations = [];
      let row = sourceChars.length;
      let column = typedChars.length;
      while (row > 0 || column > 0) {
        if (
          row > 0
          && column > 0
          && sourceChars[row - 1] === typedChars[column - 1]
          && matrix[row][column] === matrix[row - 1][column - 1]
        ) {
          operations.push({ type: "equal", source: sourceChars[row - 1], typed: typedChars[column - 1] });
          row -= 1;
          column -= 1;
        } else if (row > 0 && column > 0 && matrix[row][column] === matrix[row - 1][column - 1] + 1) {
          operations.push({ type: "replace", source: sourceChars[row - 1], typed: typedChars[column - 1] });
          row -= 1;
          column -= 1;
        } else if (row > 0 && matrix[row][column] === matrix[row - 1][column] + 1) {
          operations.push({ type: "missing", source: sourceChars[row - 1], typed: null });
          row -= 1;
        } else {
          operations.push({ type: "extra", source: null, typed: typedChars[column - 1] });
          column -= 1;
        }
      }

      operations.reverse();
      let sourcePosition = 0;
      const errors = [];
      const counts = { replace: 0, missing: 0, extra: 0 };
      operations.forEach((operation) => {
        if (operation.type === "extra") {
          counts.extra += 1;
          const position = sourcePosition
            ? `${state.lang === "zh" ? `第 ${sourcePosition} 字后` : `after character ${sourcePosition}`}`
            : (state.lang === "zh" ? "开头" : "at the beginning");
          errors.push(state.lang === "zh"
            ? `${position}多写“${operation.typed}”`
            : `Extra “${operation.typed}” ${position}`);
          return;
        }

        sourcePosition += 1;
        if (operation.type === "replace") {
          counts.replace += 1;
          errors.push(state.lang === "zh"
            ? `第 ${sourcePosition} 字：你写“${operation.typed}”，应为“${operation.source}”`
            : `Character ${sourcePosition}: wrote “${operation.typed}”, expected “${operation.source}”`);
        }
        if (operation.type === "missing") {
          counts.missing += 1;
          errors.push(state.lang === "zh"
            ? `第 ${sourcePosition} 字：漏写“${operation.source}”`
            : `Character ${sourcePosition}: missing “${operation.source}”`);
        }
      });

      return { operations, errors, counts };
    }

    function chineseTextDiffHTML(item) {
      const diff = chineseTextDiff(contentOf(item.verse).text, item.answer.text || "");
      if (!diff) return "";

      const userLine = diff.operations.map((operation) => {
        if (operation.type === "missing") return `<span class="text-diff-char user-missing" aria-label="漏字">□</span>`;
        const className = operation.type === "equal" ? "" : " user-error";
        return `<span class="text-diff-char${className}">${escapeHTML(operation.typed)}</span>`;
      }).join("");
      const correctLine = diff.operations.map((operation) => {
        if (operation.type === "extra") return `<span class="text-diff-char correct-extra" aria-label="多字位置">□</span>`;
        const className = operation.type === "equal" ? "" : " correct-error";
        return `<span class="text-diff-char${className}">${escapeHTML(operation.source)}</span>`;
      }).join("");
      const hasErrors = diff.errors.length > 0;
      const summary = hasErrors
        ? (state.lang === "zh"
          ? `错 ${diff.counts.replace} 字 · 漏 ${diff.counts.missing} 字 · 多 ${diff.counts.extra} 字`
          : `${diff.counts.replace} wrong · ${diff.counts.missing} missing · ${diff.counts.extra} extra`)
        : t("exactTextMatch");

      return `
        <div class="text-diff">
          <p class="text-diff-summary">${summary}</p>
          <p class="text-diff-label">${t("yourTextAnswer")}</p>
          <div class="text-diff-line">${userLine}</div>
          <p class="text-diff-label">${t("correctTextAnswer")}</p>
          <div class="text-diff-line">${correctLine}</div>
          ${hasErrors ? `<ol class="text-diff-errors">${diff.errors.map((error) => `<li>${escapeHTML(error)}</li>`).join("")}</ol>` : ""}
        </div>
      `;
    }

    function auditPair(pair) {
      const evaluateAnswer = (answer, verse, answerIndex) => {
        const expected = parsedReference(verse);
        const referenceCorrect = normalizedReferencePart(answer.book) === normalizedReferencePart(expected.book)
          && normalizedReferencePart(answer.chapter) === normalizedReferencePart(expected.chapter)
          && normalizedReferencePart(answer.verse) === normalizedReferencePart(expected.verse);
        const textPercent = textSimilarity(contentOf(verse).text, answer.text || "", verse);
        return { verse, expected, answer, answerIndex, referenceCorrect, textPercent };
      };
      const answers = pair.verses.map((_, index) => state.pairAnswers[index] || {});
      const directItems = pair.verses.map((verse, index) => evaluateAnswer(answers[index], verse, index));
      let items = directItems;

      if (pair.verses.length === 2) {
        const swappedItems = [
          evaluateAnswer(answers[0], pair.verses[1], 0),
          evaluateAnswer(answers[1], pair.verses[0], 1)
        ];
        const assignmentScore = (assignment) => assignment.reduce(
          (sum, item) => sum + item.textPercent + (item.referenceCorrect ? 100 : 0),
          0
        );
        if (assignmentScore(swappedItems) > assignmentScore(directItems)) items = swappedItems;
      }

      const averageText = items.length
        ? Math.round(items.reduce((sum, item) => sum + item.textPercent, 0) / items.length)
        : 0;
      const allReferencesCorrect = items.every((item) => item.referenceCorrect);
      const allTextsExact = items.every((item) => item.textPercent === 100);
      const mastered = allReferencesCorrect && allTextsExact;
      const overall = items.length
        ? Math.round(items.reduce((sum, item) => sum + item.textPercent * .8 + (item.referenceCorrect ? 20 : 0), 0) / items.length)
        : 0;
      return { items, averageText, allReferencesCorrect, allTextsExact, mastered, overall };
    }

      pair.verses.forEach((verse) => {

        </div>
        <p class="small-note">${escapeHTML(content.theme)} · ${verse.custom ? t("custom") : t("builtIn")}</p>
        ${nivURL ? `<p class="small-note"><a class="compare-link" href="${nivURL}" target="_blank" rel="noopener noreferrer">${t("nivCompare")}</a> · ${t("nivNote")}</p>` : ""}

        <div class="section-title">${t("memorizeMode")}</div>
        <div class="segmented">
          ${["full", "blanks", "initials", "selfTest"].map((mode) => `
            <button class="${state.mode === mode ? "active" : ""}" data-mode="${mode}">${t(`modes.${mode}`)}</button>
          `).join("")}
        </div>

        ${scriptureBody(verse)}

        <div class="speech-controls">
          <select class="speech-rate" id="speechRate" aria-label="${t("speechRate")}">
            <option value="slow" ${state.speechRate === "slow" ? "selected" : ""}>${t("rateSlow")}</option>
            <option value="normal" ${state.speechRate === "normal" ? "selected" : ""}>${t("rateNormal")}</option>
            <option value="fast" ${state.speechRate === "fast" ? "selected" : ""}>${t("rateFast")}</option>
          </select>
          <button class="btn primary" id="speakButton">▶ ${t("speak")}</button>
          <button class="btn" id="stopSpeakButton">■ ${t("stopSpeak")}</button>
        </div>

        <div class="actions">
          ${state.mode === "blanks" || state.mode === "initials" ? `<button class="btn" id="hintButton">☼ ${t("hint")}</button>` : ""}
          ${state.mode === "selfTest" ? `<button class="btn" id="checkAnswerButton">✓ ${t("checkAnswer")}</button>` : ""}
          <button class="btn primary" id="doneButton">✓ ${t("markDone")}</button>
          <button class="btn warn" id="resetButton">↺ ${t("reset")}</button>
          ${verse.custom ? `<button class="btn warn" id="deleteCustomButton">× ${t("deleteCustom")}</button>` : ""}
        </div>

        <div class="card">
          <strong>${progress.isMemorized ? t("done") : t("practicing")}</strong>
          <p class="small-note">${t("reviewCount")}：${progress.reviewCount}</p>
          ${progress.lastReviewedAt || progress.lastReviewedAtKey ? `<p class="small-note">${t("lastReviewed")}：${progress.lastReviewedAt || t(progress.lastReviewedAtKey)}</p>` : ""}
        </div>
      `;

      document.querySelector("#backButton").addEventListener("click", () => {
        stopSpeaking();
        state.detailID = null;
        state.mode = "full";
        state.hint = 0;
        state.answer = "";
        state.selfTestChecked = false;
        render();
      });

      document.querySelector("#favoriteButton").addEventListener("click", () => {
        if (state.favorites.has(verse.id)) state.favorites.delete(verse.id);
        else state.favorites.add(verse.id);
        saveState();
        render();
      });

      document.querySelector("#speechRate").addEventListener("change", (event) => {
        state.speechRate = event.target.value;
        saveState();
      });

      document.querySelector("#speakButton").addEventListener("click", () => {
        speakVerse(verse);
      });

      document.querySelector("#stopSpeakButton").addEventListener("click", () => {
        stopSpeaking();
      });

      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          state.mode = button.dataset.mode;
          state.hint = 0;
          state.answer = "";
          state.selfTestChecked = false;
          render();
        });
      });

      const answerInput = document.querySelector("#answerInput");
      if (answerInput) {
        answerInput.addEventListener("input", (event) => {
          state.answer = event.target.value;
          state.selfTestChecked = false;
          const compare = document.querySelector(".compare");
          if (compare) compare.textContent = t("compareEmpty");
        });
      }

      const checkAnswerButton = document.querySelector("#checkAnswerButton");
      if (checkAnswerButton) {
        checkAnswerButton.addEventListener("click", () => {
          state.selfTestChecked = true;
          render();
        });
      }

      const hintButton = document.querySelector("#hintButton");
      if (hintButton) {
        hintButton.addEventListener("click", () => {
          state.hint = Math.min(state.hint + 1, 3);
          render();
        });
      }

      document.querySelector("#doneButton").addEventListener("click", () => {
        const old = progressFor(verse);
        state.progress[verse.id] = {
          reviewCount: old.reviewCount + 1,
          isMemorized: true,
          lastReviewedAt: t("justNow")
        };
        saveState();
        render();
      });

      document.querySelector("#resetButton").addEventListener("click", () => {
        state.progress[verse.id] = { reviewCount: 0, isMemorized: false, lastReviewedAt: null };
        saveState();
        render();
      });

      const deleteCustomButton = document.querySelector("#deleteCustomButton");
      if (deleteCustomButton) {
        deleteCustomButton.addEventListener("click", () => {
          if (!verse.custom || !confirm(t("deleteConfirm"))) return;
          stopSpeaking();
          state.customVerses = state.customVerses.filter((item) => item.id !== verse.id);
          state.favorites.delete(verse.id);
          state.loopVerseIDs = state.loopVerseIDs.filter((id) => id !== verse.id);
          delete state.progress[verse.id];
          state.detailID = null;
          state.mode = "full";
          state.hint = 0;
          state.answer = "";
          state.selfTestChecked = false;
          saveState();
          render();
        });
      }
    }

    function wireVerseCards() {
      document.querySelectorAll("[data-open]").forEach((button) => {
        button.addEventListener("click", () => {
          state.detailID = button.dataset.open;
          state.mode = "full";
          state.hint = 0;
          state.answer = "";
          state.selfTestChecked = false;
          render();
        });
      });
    }

    function render() {
      document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
      const size = fontSizes[state.fontSize];
      const interfaceScale = interfaceScales[state.fontSize] || 1;
      document.documentElement.style.setProperty("--list-font-size", `${size.list}px`);
      document.documentElement.style.setProperty("--reader-font-size", `${size.reader}px`);
      [11, 12, 13, 14, 15, 16, 17, 18, 20, 24, 28].forEach((base) => {
        document.documentElement.style.setProperty(`--ui-font-${base}`, `${Math.round(base * interfaceScale)}px`);
      });
      langSwitch.textContent = t("switchLang");
      fontSizeLabel.textContent = t(`fontSizeLabel.${state.fontSize}`);
      fontDown.disabled = state.fontSize === fontSteps[0];
      fontUp.disabled = state.fontSize === fontSteps[fontSteps.length - 1];
      tabButtons.forEach((button) => button.classList.toggle("active", button.dataset.tab === state.tab));
      tabButtons.forEach((button) => {
        button.querySelector("span:last-child").textContent = t(`nav.${button.dataset.tab}`);
      });

      if (state.pairID) {
        renderPairPractice();
        return;
      }

      if (state.detailID) {
        renderDetail();
        return;
      }

      const [subtitle, title] = t(`tabs.${state.tab}`);
      eyebrow.textContent = subtitle;
      pageTitle.textContent = title;

      if (state.tab === "today") renderToday();
      if (state.tab === "library") renderLibrary();
      if (state.tab === "favorites") renderFavorites();
      if (state.tab === "listen") renderListen();
      if (state.tab === "progress") renderProgress();

      wireVerseCards();
    }

    tabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        stopSpeaking();
        state.tab = button.dataset.tab;
        state.detailID = null;
        state.pairID = null;
        state.pairStage = "recall";
        state.pairAnswers = [];
        state.mode = "full";
        state.hint = 0;
        state.answer = "";
        state.selfTestChecked = false;
        render();
      });
    });

    langSwitch.addEventListener("click", () => {
      stopSpeaking();
      state.lang = state.lang === "zh" ? "en" : "zh";
      state.search = "";
      state.answer = "";
      saveState();
      render();
    });

    fontDown.addEventListener("click", () => {
      const index = fontSteps.indexOf(state.fontSize);
      state.fontSize = fontSteps[Math.max(0, index - 1)];
      localStorage.setItem("scripture.prototype.fontSize", state.fontSize);
      saveState();
      render();
    });

    fontUp.addEventListener("click", () => {
      const index = fontSteps.indexOf(state.fontSize);
      state.fontSize = fontSteps[Math.min(fontSteps.length - 1, index + 1)];
      localStorage.setItem("scripture.prototype.fontSize", state.fontSize);
      saveState();
      render();
    });

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    render();
  </script>
</body>
</html>
